; Claude Code Status Display — firmware for the LilyGO T-Display-S3 (ESP32-S3).
; Build & flash:  pio run -e claude_display -t upload
; Serial monitor: pio device monitor -b 115200

[platformio]
default_envs = claude_display
boards_dir = ./boards
src_dir = src

[env:claude_display]
platform = espressif32@6.5.0
board = lilygo-t-displays3
framework = arduino
upload_protocol = esptool
monitor_speed = 115200
build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1   ; Serial over the USB-C port
    -DARDUINO_USB_MODE=1
    -DDISABLE_ALL_LIBRARY_WARNINGS
lib_deps =
    bblanchon/ArduinoJson@^7
    moononournation/GFX Library for Arduino@1.4.2   ; 1.4.2 = last release compatible with esp32 core in platform 6.5.0
